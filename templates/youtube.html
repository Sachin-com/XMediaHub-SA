<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>▶ YouTube Downloader</h1>

    <form id="downloadForm"
          action="/youtube/download"
          method="POST">

        <input
            type="text"
            id="url"
            name="url"
            placeholder="Paste YouTube URL"
            required>

        <br><br>

        <button
            type="button"
            id="fetchBtn">
            Fetch Video Info
        </button>

        <br><br>

        <div id="videoInfo" style="display:none;">

            <img
                id="thumb"
                src=""
                width="320"
                style="border-radius:10px;">

            <h2 id="title"></h2>

            <p id="channel"></p>

            <p id="duration"></p>

            <p id="views"></p>

        </div>

        <br>

        <label><b>Select Quality</b></label>

        <br><br>

        <select
            id="quality"
            name="quality">

            <option value="best">
                Loading...
            </option>

        </select>

        <br><br>

        <button id="downloadBtn"
                type="submit">
            ⬇ Download
        </button>

    </form>

    <br>

    <a href="/">⬅ Home</a>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
